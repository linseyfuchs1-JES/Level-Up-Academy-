<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Up Academy — Player App</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');

:root {
  --bg: #F5F3FF;
  --bg2: #EDE9FE;
  --surface: #FFFFFF;
  --surface2: #F0EEFF;
  --surface3: #E8E4FF;
  --gold: #D97706;
  --gold2: #F59E0B;
  --gold-light: #FEF3C7;
  --neon-blue: #2563EB;
  --neon-blue-light: #DBEAFE;
  --neon-green: #059669;
  --neon-green-light: #D1FAE5;
  --neon-purple: #7C3AED;
  --neon-purple-light: #EDE9FE;
  --neon-red: #DC2626;
  --neon-red-light: #FEE2E2;
  --text: #1E1B4B;
  --text-mid: #4C4A6B;
  --text-dim: #7C7A9A;
  --border: rgba(124,58,237,0.15);
  --border-strong: rgba(124,58,237,0.25);
  --shadow: 0 2px 12px rgba(124,58,237,0.08);
  --shadow-md: 0 4px 24px rgba(124,58,237,0.12);
  --shadow-lg: 0 8px 40px rgba(124,58,237,0.16);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* Soft dot pattern background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(124,58,237,0.07) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
  z-index: 0;
}

/* Soft blobs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
  animation: floatOrb 10s ease-in-out infinite;
}
.orb1 { width: 400px; height: 400px; background: rgba(124,58,237,0.07); top: -150px; left: -100px; animation-delay: 0s; }
.orb2 { width: 350px; height: 350px; background: rgba(245,158,11,0.07); bottom: -100px; right: -80px; animation-delay: 4s; }
.orb3 { width: 300px; height: 300px; background: rgba(37,99,235,0.06); top: 35%; left: 55%; animation-delay: 7s; }

@keyframes floatOrb {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(24px, -24px); }
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 32px 20px 100px;
  position: relative;
  z-index: 1;
}

/* ── PLAYER SELECT SCREEN ── */
#playerSelectScreen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 48px;
  padding: 60px 24px;
  position: relative;
  z-index: 1;
}

.title-logo { text-align: center; }
.title-main {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(36px, 9vw, 64px);
  color: var(--neon-purple);
  text-shadow:
    0 2px 0 rgba(124,58,237,0.2),
    0 8px 30px rgba(124,58,237,0.2);
  letter-spacing: 2px;
  line-height: 1.1;
}
.title-sub {
  font-size: 13px;
  color: var(--text-dim);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 12px;
  font-weight: 700;
}

.press-start {
  font-family: 'Fredoka One', cursive;
  font-size: 15px;
  color: var(--neon-blue);
  letter-spacing: 2px;
  animation: blink 1.2s step-end infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

.player-cards {
  display: flex;
  gap: 28px;
  flex-wrap: wrap;
  justify-content: center;
}

.player-card {
  background: var(--surface);
  border: 2px solid var(--border-strong);
  border-radius: 28px;
  padding: 44px 36px;
  width: 240px;
  text-align: center;
  cursor: pointer;
  transition: all 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.player-card::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.25s;
  border-radius: 28px;
}
.player-card.p1::before { background: radial-gradient(ellipse at 50% 0%, rgba(37,99,235,0.08), transparent 70%); }
.player-card.p2::before { background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.08), transparent 70%); }
.player-card:hover { transform: translateY(-10px); box-shadow: var(--shadow-lg); }
.player-card.p1:hover { border-color: var(--neon-blue); }
.player-card.p2:hover { border-color: var(--neon-purple); }
.player-card:hover::before { opacity: 1; }

.player-avatar { font-size: 64px; margin-bottom: 16px; display: block; }
.player-label {
  font-family: 'Fredoka One', cursive;
  font-size: 24px;
  margin-bottom: 6px;
}
.p1 .player-label { color: var(--neon-blue); }
.p2 .player-label { color: var(--neon-purple); }
.player-info { font-size: 13px; color: var(--text-dim); font-weight: 600; }
.player-xp {
  margin-top: 18px;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 1px;
  padding: 6px 14px;
  border-radius: 20px;
  display: inline-block;
}
.p1 .player-xp { background: var(--neon-blue-light); color: var(--neon-blue); }
.p2 .player-xp { background: var(--neon-purple-light); color: var(--neon-purple); }

/* ── MAIN APP ── */
#mainApp { display: none; }

/* Header */
.app-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 0 32px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 32px;
}
.back-btn {
  background: var(--surface);
  border: 2px solid var(--border-strong);
  border-radius: 14px;
  color: var(--text-dim);
  font-size: 18px;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  box-shadow: var(--shadow);
  flex-shrink: 0;
}
.back-btn:hover { border-color: var(--neon-purple); color: var(--neon-purple); box-shadow: var(--shadow-md); }
.header-info { flex: 1; }
.header-player {
  font-family: 'Fredoka One', cursive;
  font-size: 20px;
}
.header-player.p1c { color: var(--neon-blue); }
.header-player.p2c { color: var(--neon-purple); }
.header-sub { font-size: 12px; color: var(--text-dim); margin-top: 3px; font-weight: 700; }
.header-xp {
  background: var(--gold-light);
  border: 2px solid rgba(217,119,6,0.25);
  border-radius: 16px;
  padding: 10px 18px;
  text-align: center;
  box-shadow: var(--shadow);
}
.xp-num {
  font-family: 'Fredoka One', cursive;
  font-size: 24px;
  color: var(--gold);
  line-height: 1;
}
.xp-label { font-size: 10px; color: var(--gold2); letter-spacing: 1px; font-weight: 800; margin-top: 2px; }

/* XP bar */
.xp-bar-wrap {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 20px 24px;
  margin-bottom: 28px;
  box-shadow: var(--shadow);
}
.xp-bar-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-mid); margin-bottom: 12px; font-weight: 800; letter-spacing: 1px; }
.xp-bar-track {
  height: 12px;
  background: var(--surface3);
  border-radius: 12px;
  overflow: hidden;
}
.xp-bar-fill {
  height: 100%;
  border-radius: 12px;
  background: linear-gradient(90deg, var(--gold2), var(--gold));
  transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 0 12px rgba(245,158,11,0.4);
}

/* Week selector */
.week-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 8px;
  margin-bottom: 28px;
  scrollbar-width: none;
}
.week-scroll::-webkit-scrollbar { display: none; }
.week-pill {
  flex-shrink: 0;
  background: var(--surface);
  border: 2px solid var(--border-strong);
  border-radius: 40px;
  padding: 9px 20px;
  font-size: 12px;
  font-weight: 800;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  font-family: inherit;
  box-shadow: var(--shadow);
}
.week-pill:hover { border-color: var(--neon-purple); color: var(--neon-purple); }
.week-pill.active { background: var(--neon-purple); border-color: var(--neon-purple); color: #fff; box-shadow: 0 4px 16px rgba(124,58,237,0.3); }

/* Day cards */
.days-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px; }

.day-tile {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
  box-shadow: var(--shadow);
}
.day-tile:hover { box-shadow: var(--shadow-md); }
.day-tile.completed { border-color: rgba(5,150,105,0.35); background: linear-gradient(135deg, #fff, #f0fdf8); }
.day-tile.active-day { border-color: rgba(217,119,6,0.4); }

.day-tile-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 24px;
  cursor: pointer;
}
.day-icon {
  width: 48px; height: 48px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.icon-math { background: var(--neon-blue-light); }
.icon-grammar { background: var(--neon-purple-light); }
.icon-ai { background: var(--neon-green-light); }
.icon-free { background: var(--neon-red-light); }

.day-meta { flex: 1; }
.day-name { font-weight: 900; font-size: 16px; color: var(--text); }
.day-type { font-size: 12px; color: var(--text-dim); margin-top: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

.day-status { display: flex; align-items: center; gap: 10px; }
.check-circle {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 2px solid var(--border-strong);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  transition: all 0.3s;
  background: transparent;
  cursor: pointer;
  font-family: inherit;
  flex-shrink: 0;
}
.check-circle.done { background: var(--neon-green); border-color: var(--neon-green); color: #fff; }
.day-xp-badge {
  background: var(--gold-light);
  border: 1px solid rgba(217,119,6,0.25);
  border-radius: 10px;
  padding: 5px 10px;
  font-size: 11px;
  font-weight: 800;
  color: var(--gold);
  white-space: nowrap;
}

.day-body {
  display: none;
  border-top: 2px solid var(--border);
  padding: 24px 24px 24px;
}
.day-tile.open .day-body { display: block; }

/* Segments */
.seg-block { margin-bottom: 24px; }
.seg-block:last-of-type { margin-bottom: 0; }
.seg-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.seg-badge {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1px;
  padding: 5px 12px;
  border-radius: 8px;
  text-transform: uppercase;
}
.badge-warmup { background: rgba(245,158,11,0.15); color: var(--gold); border: 1px solid rgba(245,158,11,0.3); }
.badge-mission { background: var(--neon-blue-light); color: var(--neon-blue); border: 1px solid rgba(37,99,235,0.2); }
.badge-boss { background: var(--neon-red-light); color: var(--neon-red); border: 1px solid rgba(220,38,38,0.2); }
.seg-timer { font-size: 11px; color: var(--text-dim); font-weight: 700; }
.seg-content { font-size: 14px; line-height: 1.75; color: var(--text-mid); }
.seg-content strong { color: var(--text); font-weight: 900; }

.player-split { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
.split-block { flex: 1; min-width: 200px; border-radius: 14px; padding: 16px; }
.split-p1 { background: var(--neon-blue-light); border: 1px solid rgba(37,99,235,0.2); }
.split-p2 { background: var(--neon-purple-light); border: 1px solid rgba(124,58,237,0.2); }
.split-label { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.split-p1 .split-label { color: var(--neon-blue); }
.split-p2 .split-label { color: var(--neon-purple); }
.split-content { font-size: 13px; line-height: 1.65; color: var(--text-mid); }

/* Khan Academy links */
.tools-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px; margin-bottom: 4px; }
.tool-chip {
  background: var(--surface2);
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  padding: 5px 12px;
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 700;
}
.ka-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #1DB954;
  background: linear-gradient(135deg, #14A085, #1D7A4F);
  border: none;
  border-radius: 8px;
  padding: 5px 12px;
  font-size: 11px;
  color: #fff;
  font-weight: 800;
  text-decoration: none;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}
.ka-link:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(20,160,133,0.35); }
.ka-link::before { content: '📚'; }

/* Complete button */
.complete-btn {
  width: 100%;
  margin-top: 24px;
  padding: 16px;
  border-radius: 14px;
  border: none;
  font-family: 'Fredoka One', cursive;
  font-size: 17px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.complete-btn.incomplete {
  background: linear-gradient(135deg, var(--neon-purple), #A855F7);
  color: #fff;
  box-shadow: 0 4px 20px rgba(124,58,237,0.35);
}
.complete-btn.incomplete:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,58,237,0.4); }
.complete-btn.completed-state {
  background: var(--neon-green-light);
  border: 2px solid var(--neon-green);
  color: var(--neon-green);
  cursor: default;
  font-weight: 800;
}

/* Free day tile */
.free-day-body { padding: 20px 0 4px; color: var(--text-mid); font-size: 14px; line-height: 1.75; }
.free-day-title { font-family: 'Fredoka One', cursive; font-size: 16px; color: var(--neon-red); margin-bottom: 10px; }

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 28px;
}
.stat-box {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 18px;
  padding: 20px 16px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-num { font-family: 'Fredoka One', cursive; font-size: 30px; color: var(--neon-purple); line-height: 1; }
.stat-label { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; margin-top: 6px; text-transform: uppercase; font-weight: 800; }

/* XP popup */
.xp-popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: var(--surface);
  border: 3px solid var(--neon-purple);
  border-radius: 28px;
  padding: 44px 56px;
  text-align: center;
  z-index: 100;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 0 60px rgba(124,58,237,0.25);
}
.xp-popup.show { transform: translate(-50%, -50%) scale(1); }
.popup-icon { font-size: 64px; margin-bottom: 12px; }
.popup-title { font-family: 'Fredoka One', cursive; font-size: 28px; color: var(--neon-purple); }
.popup-xp { font-family: 'Fredoka One', cursive; font-size: 56px; color: var(--neon-green); line-height: 1; margin: 8px 0; }
.popup-sub { font-size: 14px; color: var(--text-dim); font-weight: 700; }
.popup-close {
  margin-top: 24px;
  background: linear-gradient(135deg, var(--neon-purple), #A855F7);
  border: none;
  border-radius: 14px;
  padding: 13px 36px;
  font-family: 'Fredoka One', cursive;
  font-size: 17px;
  color: #fff;
  cursor: pointer;
  transition: transform 0.15s;
  box-shadow: 0 4px 16px rgba(124,58,237,0.3);
}
.popup-close:hover { transform: scale(1.05); }
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(30,27,75,0.4);
  backdrop-filter: blur(4px);
  z-index: 99;
  display: none;
}
.overlay.show { display: block; }

/* Stars burst */
.star-burst {
  position: fixed;
  pointer-events: none;
  z-index: 101;
  font-size: 26px;
  animation: burstAnim 1s ease-out forwards;
}
@keyframes burstAnim {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3); }
}

/* Divider between segments */
.seg-divider { border: none; border-top: 1px solid var(--border); margin: 4px 0 4px; }

/* Section label */
.section-label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* Week header */
.week-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding: 18px 22px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 18px;
  box-shadow: var(--shadow);
}
.week-icon { font-size: 28px; }
.week-title { font-family: 'Fredoka One', cursive; font-size: 17px; color: var(--neon-purple); }
.week-progress { font-size: 12px; color: var(--text-dim); font-weight: 700; margin-top: 2px; }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- Player Select -->
<div id="playerSelectScreen">
  <div class="title-logo">
    <div class="title-main">⚔️ LEVEL UP<br>ACADEMY</div>
    <div class="title-sub">Summer Bridge Program</div>
  </div>
  <div class="press-start">▶ CHOOSE YOUR PLAYER</div>
  <div class="player-cards">
    <div class="player-card p1" onclick="selectPlayer(1)">
      <span class="player-avatar">🧑‍🚀</span>
      <div class="player-label">PLAYER 1</div>
      <div class="player-info">Age 9 · Rising 4th Grade</div>
      <div class="player-xp" id="p1xpDisplay">⚡ 0 XP</div>
    </div>
    <div class="player-card p2" onclick="selectPlayer(2)">
      <span class="player-avatar">🧙‍♂️</span>
      <div class="player-label">PLAYER 2</div>
      <div class="player-info">Age 11 · Rising 6th Grade</div>
      <div class="player-xp" id="p2xpDisplay">⚡ 0 XP</div>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="mainApp">
  <div class="container">
    <div class="app-header">
      <button class="back-btn" onclick="goBack()">←</button>
      <div class="header-info">
        <div class="header-player" id="headerPlayerName">Player 1</div>
        <div class="header-sub" id="headerPlayerSub">Age 9 · Rising 4th Grade</div>
      </div>
      <div class="header-xp">
        <div class="xp-num" id="headerXP">0</div>
        <div class="xp-label">XP</div>
      </div>
    </div>

    <div class="xp-bar-wrap">
      <div class="xp-bar-header">
        <span id="levelLabel">LEVEL 1</span>
        <span id="xpToNext">0 / 200 XP</span>
      </div>
      <div class="xp-bar-track">
        <div class="xp-bar-fill" id="xpBarFill" style="width:0%"></div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-num" id="statSessions">0</div>
        <div class="stat-label">Sessions Done</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statStreak">0</div>
        <div class="stat-label">Day Streak 🔥</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statWeeks">0</div>
        <div class="stat-label">Weeks Done</div>
      </div>
    </div>

    <div class="week-scroll" id="weekScroll"></div>
    <div id="weekHeader"></div>
    <div class="days-list" id="daysList"></div>
  </div>
</div>

<!-- XP Popup -->
<div class="overlay" id="overlay" onclick="closePopup()"></div>
<div class="xp-popup" id="xpPopup">
  <div class="popup-icon" id="popupIcon">⭐</div>
  <div class="popup-title" id="popupTitle">SESSION COMPLETE!</div>
  <div class="popup-xp" id="popupXP">+50 XP</div>
  <div class="popup-sub" id="popupSub">Keep going!</div>
  <button class="popup-close" onclick="closePopup()">AWESOME! 🎮</button>
</div>

<script>
// ─── KHAN ACADEMY LINKS ─────────────────────────────────────────────

// ─── STATE ───────────────────────────────────────────────────────────
const STORAGE_KEY = 'levelUpAcademy_v3';
let state = { p1: { xp: 0, completed: {} }, p2: { xp: 0, completed: {} } };
let currentPlayer = null;
let currentWeek = 0;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function getPlayerState() {
  return currentPlayer === 1 ? state.p1 : state.p2;
}

function getDayKey(weekIdx, dayIdx) {
  return `w${weekIdx}_d${dayIdx}`;
}

function isCompleted(weekIdx, dayIdx) {
  return !!getPlayerState().completed[getDayKey(weekIdx, dayIdx)];
}

function getTotalXP() { return getPlayerState().xp; }

function getLevel() {
  const xp = getTotalXP();
  let level = 0;
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (xp >= LEVELS[i].xp) { level = i; break; }
  }
  return level;
}

function getLevelProgress() {
  const xp = getTotalXP();
  const lvl = getLevel();
  const curr = LEVELS[lvl].xp;
  const next = LEVELS[lvl + 1] ? LEVELS[lvl + 1].xp : curr + 500;
  return { pct: Math.min(100, ((xp - curr) / (next - curr)) * 100), curr: xp - curr, total: next - curr, nextName: LEVELS[lvl + 1]?.name || 'MAX' };
}

function getSessionCount() {
  return Object.keys(getPlayerState().completed).length;
}

function getWeeksCompleted() {
  let count = 0;
  WEEKS.forEach((w, wi) => {
    const done = w.days.every((_, di) => isCompleted(wi, di));
    if (done) count++;
  });
  return count;
}

function getStreak() {
  return Math.min(getSessionCount(), 7);
}

// ─── RENDER ───────────────────────────────────────────────────────────
function updateHeader() {
  const xp = getTotalXP();
  const lvl = getLevel();
  const prog = getLevelProgress();
  document.getElementById('headerXP').textContent = xp;
  document.getElementById('headerPlayerName').textContent = `${LEVELS[lvl].name} — Player ${currentPlayer}`;
  document.getElementById('headerPlayerName').className = `header-player p${currentPlayer}c`;
  document.getElementById('headerPlayerSub').textContent = currentPlayer === 1 ? 'Age 9 · Rising 4th Grade' : 'Age 11 · Rising 6th Grade';
  document.getElementById('levelLabel').textContent = `LEVEL ${lvl + 1}: ${LEVELS[lvl].name.toUpperCase()}`;
  document.getElementById('xpToNext').textContent = `${prog.curr} / ${prog.total} XP → ${prog.nextName}`;
  document.getElementById('xpBarFill').style.width = prog.pct + '%';
  document.getElementById('statSessions').textContent = getSessionCount();
  document.getElementById('statStreak').textContent = getStreak();
  document.getElementById('statWeeks').textContent = getWeeksCompleted();
}

function renderWeekNav() {
  const nav = document.getElementById('weekScroll');
  nav.innerHTML = WEEKS.map((w, i) => {
    const allDone = w.days.every((_, di) => isCompleted(i, di));
    return `<button class="week-pill ${i === currentWeek ? 'active' : ''}" onclick="selectWeek(${i})">${w.icon} ${allDone ? '✅' : ''} Wk ${w.num}</button>`;
  }).join('');
}

function renderWeekHeader() {
  const w = WEEKS[currentWeek];
  const doneDays = w.days.filter((_, di) => isCompleted(currentWeek, di)).length;
  document.getElementById('weekHeader').innerHTML = `
    <div class="week-header">
      <div class="week-icon">${w.icon}</div>
      <div>
        <div class="week-title">${w.label}</div>
        <div class="week-progress">${doneDays} of ${w.days.length} days complete</div>
      </div>
    </div>`;
}

function buildKALinks(links) {
  if (!links || !links.length) return '';
  return links.map(l => `<a class="ka-link" href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`).join('');
}

function renderDays() {
  const list = document.getElementById('daysList');
  const week = WEEKS[currentWeek];
  list.innerHTML = week.days.map((day, di) => {
    const done = isCompleted(currentWeek, di);
    const iconClass = `icon-${day.type}`;
    const key = `day-${currentWeek}-${di}`;

    if (day.free) {
      return `<div class="day-tile ${done ? 'completed' : ''}" id="${key}">
        <div class="day-tile-header" onclick="toggleDay('${key}')">
          <div class="day-icon ${iconClass}">${day.emoji}</div>
          <div class="day-meta">
            <div class="day-name">${day.name}</div>
            <div class="day-type">Free Day 🎉</div>
          </div>
          <div class="day-status">
            <div class="day-xp-badge">+${day.xp} XP</div>
            <button class="check-circle ${done ? 'done' : ''}" onclick="event.stopPropagation(); markComplete(${currentWeek}, ${di}, ${day.xp})">${done ? '✓' : ''}</button>
          </div>
        </div>
        <div class="day-body">
          <div class="free-day-body">
            <div class="free-day-title">🎮 FREE DAY</div>
            ${day.freeText}
          </div>
          ${!done ? `<button class="complete-btn incomplete" onclick="markComplete(${currentWeek}, ${di}, ${day.xp})">🎉 Mark Free Day Done! +${day.xp} XP</button>` : `<div class="complete-btn completed-state">✅ Completed!</div>`}
        </div>
      </div>`;
    }

    let missionHTML = '';
    if (day.mission.split) {
      const p1ka = buildKALinks(day.mission.p1_ka);
      const p2ka = buildKALinks(day.mission.p2_ka);
      missionHTML = `<div class="player-split">
        <div class="split-block split-p1">
          <div class="split-label">Player 1 · 4th Grade</div>
          <div class="split-content">${day.mission.p1}</div>
          ${p1ka ? `<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">${p1ka}</div>` : ''}
        </div>
        <div class="split-block split-p2">
          <div class="split-label">Player 2 · 6th Grade</div>
          <div class="split-content">${day.mission.p2}</div>
          ${p2ka ? `<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">${p2ka}</div>` : ''}
        </div>
      </div>`;
    } else {
      missionHTML = `<div class="seg-content">${day.mission.content}</div>`;
    }

    const otherTools = (day.tools || []).filter(t => t !== 'Khan Academy');
    const toolChips = otherTools.map(t => `<span class="tool-chip">${t}</span>`).join('');

    return `<div class="day-tile ${done ? 'completed' : ''}" id="${key}">
      <div class="day-tile-header" onclick="toggleDay('${key}')">
        <div class="day-icon ${iconClass}">${day.emoji}</div>
        <div class="day-meta">
          <div class="day-name">${day.name}</div>
          <div class="day-type">${day.type.charAt(0).toUpperCase() + day.type.slice(1)}</div>
        </div>
        <div class="day-status">
          <div class="day-xp-badge">+${day.xp} XP</div>
          <button class="check-circle ${done ? 'done' : ''}" onclick="event.stopPropagation(); markComplete(${currentWeek}, ${di}, ${day.xp})">${done ? '✓' : ''}</button>
        </div>
      </div>
      <div class="day-body">
        <div class="seg-block">
          <div class="seg-header"><span class="seg-badge badge-warmup">🔥 Warm-Up</span><span class="seg-timer">5 min</span></div>
          <div class="seg-content">${day.warmup}</div>
        </div>
        <div class="seg-block">
          <div class="seg-header"><span class="seg-badge badge-mission">⚔️ Main Mission</span><span class="seg-timer">15 min</span></div>
          ${missionHTML}
        </div>
        <div class="seg-block">
          <div class="seg-header"><span class="seg-badge badge-boss">💀 Boss Battle</span><span class="seg-timer">10 min</span></div>
          <div class="seg-content">${day.boss}</div>
        </div>
        ${toolChips ? `<div class="tools-row">${toolChips}</div>` : ''}
        ${!done
          ? `<button class="complete-btn incomplete" onclick="markComplete(${currentWeek}, ${di}, ${day.xp})">✅ Session Complete! +${day.xp} XP</button>`
          : `<div class="complete-btn completed-state">✅ Session Completed!</div>`
        }
      </div>
    </div>`;
  }).join('');
}

function renderAll() {
  updateHeader();
  renderWeekNav();
  renderWeekHeader();
  renderDays();
}

// ─── ACTIONS ─────────────────────────────────────────────────────────
function selectPlayer(p) {
  currentPlayer = p;
  document.getElementById('playerSelectScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  renderAll();
  updateSelectScreen();
}

function goBack() {
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('playerSelectScreen').style.display = 'flex';
  updateSelectScreen();
  currentPlayer = null;
}

function updateSelectScreen() {
  document.getElementById('p1xpDisplay').textContent = `⚡ ${state.p1.xp} XP`;
  document.getElementById('p2xpDisplay').textContent = `⚡ ${state.p2.xp} XP`;
}

function selectWeek(idx) {
  currentWeek = idx;
  renderAll();
}

function toggleDay(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

function markComplete(weekIdx, dayIdx, xpValue) {
  const key = getDayKey(weekIdx, dayIdx);
  const ps = getPlayerState();
  if (ps.completed[key]) return;
  ps.completed[key] = true;
  ps.xp += xpValue;
  saveState();

  const day = WEEKS[weekIdx].days[dayIdx];
  showXPPopup(xpValue, day, weekIdx, dayIdx);
  renderAll();
}

function showXPPopup(xp, day, weekIdx, dayIdx) {
  const allWeekDone = WEEKS[weekIdx].days.every((_, di) => isCompleted(weekIdx, di));
  const icon = day.free ? '🎉' : day.type === 'math' ? '📐' : day.type === 'grammar' ? '✍️' : '🤖';
  const msgs = ["You're on fire! 🔥", "Crushing it!", "XP earned! 💪", "Level up incoming!", "Quest complete!", "Keep going! ⚡"];
  const sub = allWeekDone ? `🏆 Week ${weekIdx + 1} Complete! Full Week Bonus!` : msgs[Math.floor(Math.random() * msgs.length)];

  document.getElementById('popupIcon').textContent = icon;
  document.getElementById('popupTitle').textContent = day.free ? 'FREE DAY DONE!' : 'SESSION COMPLETE!';
  document.getElementById('popupXP').textContent = `+${xp} XP`;
  document.getElementById('popupSub').textContent = sub;

  document.getElementById('overlay').classList.add('show');
  document.getElementById('xpPopup').classList.add('show');

  for (let i = 0; i < 8; i++) {
    setTimeout(() => spawnStar(), i * 80);
  }
}

function spawnStar() {
  const star = document.createElement('div');
  star.className = 'star-burst';
  const icons = ['⭐','✨','💫','🌟','⚡'];
  star.textContent = icons[Math.floor(Math.random() * icons.length)];
  const tx = (Math.random() - 0.5) * 300;
  const ty = (Math.random() - 0.5) * 300;
  star.style.cssText = `left:50%;top:50%;--tx:${tx}px;--ty:${ty}px;`;
  document.body.appendChild(star);
  setTimeout(() => star.remove(), 1000);
}

function closePopup() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('xpPopup').classList.remove('show');
}

// ─── INIT ─────────────────────────────────────────────────────────────
loadState();
updateSelectScreen();
</script>

</html>
