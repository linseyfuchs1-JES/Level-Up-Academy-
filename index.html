<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Up Academy — Player App</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');

:root {
  --bg: #D0EAFB;
  --bg2: #B8DDFA;
  --surface: #FFFFFF;
  --surface2: #E8F4FD;
  --surface3: #C8E4F8;
  --gold: #D97706;
  --gold2: #F59E0B;
  --gold-light: #FEF3C7;
  --neon-blue: #2563EB;
  --neon-blue-light: #DBEAFE;
  --neon-green: #059669;
  --neon-green-light: #D1FAE5;
  --neon-purple: #7C3AED;
  --neon-purple-light: #EDE9FE;
  --neon-red: #DC2626;
  --neon-red-light: #FEE2E2;
  --text: #1E3A5F;
  --text-mid: #2D5A8E;
  --text-dim: #5B8DB8;
  --border: rgba(37,99,235,0.18);
  --border-strong: rgba(37,99,235,0.28);
  --shadow: 0 2px 12px rgba(37,99,235,0.1);
  --shadow-md: 0 4px 24px rgba(37,99,235,0.15);
  --shadow-lg: 0 8px 40px rgba(37,99,235,0.2);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 18px; /* Increased base font for Chromebook */
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(37,99,235,0.07) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
  z-index: 0;
}

.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
  animation: floatOrb 10s ease-in-out infinite;
}
.orb1 { width: 400px; height: 400px; background: rgba(37,99,235,0.08); top: -150px; left: -100px; animation-delay: 0s; }
.orb2 { width: 350px; height: 350px; background: rgba(245,158,11,0.07); bottom: -100px; right: -80px; animation-delay: 4s; }
.orb3 { width: 300px; height: 300px; background: rgba(5,150,105,0.06); top: 35%; left: 55%; animation-delay: 7s; }

@keyframes floatOrb {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(24px, -24px); }
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 28px 100px;
  position: relative;
  z-index: 1;
}

/* ── PLAYER SELECT ── */
#playerSelectScreen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 48px;
  padding: 60px 24px;
  position: relative;
  z-index: 1;
}

.title-logo { text-align: center; }
.title-main {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(40px, 9vw, 76px);
  color: var(--neon-blue);
  text-shadow: 0 2px 0 rgba(37,99,235,0.2), 0 8px 30px rgba(37,99,235,0.25);
  letter-spacing: 2px;
  line-height: 1.1;
}
.title-sub {
  font-size: 17px;
  color: var(--text-dim);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 12px;
  font-weight: 700;
}

.press-start {
  font-family: 'Fredoka One', cursive;
  font-size: 20px;
  color: var(--neon-blue);
  letter-spacing: 2px;
  animation: blink 1.2s step-end infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

.player-cards { display: flex; gap: 36px; flex-wrap: wrap; justify-content: center; }

.player-card {
  background: var(--surface);
  border: 3px solid var(--border-strong);
  border-radius: 28px;
  padding: 44px 48px;
  width: 300px;
  text-align: center;
  cursor: pointer;
  transition: all 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.player-card:hover { transform: translateY(-10px); box-shadow: var(--shadow-lg); }
.player-card.p1:hover { border-color: var(--neon-blue); }
.player-card.p2:hover { border-color: var(--neon-purple); }

.steve-avatar {
  width: 80px;
  height: 80px;
  margin: 0 auto 16px;
  display: block;
  image-rendering: pixelated;
}

.link-avatar {
  width: 80px;
  height: 80px;
  margin: 0 auto 16px;
  display: block;
}

.player-label {
  font-family: 'Fredoka One', cursive;
  font-size: 28px;
  margin-bottom: 6px;
}
.p1 .player-label { color: var(--neon-blue); }
.p2 .player-label { color: var(--neon-purple); }
.player-info { font-size: 16px; color: var(--text-dim); font-weight: 600; }
.player-xp {
  margin-top: 18px;
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 1px;
  padding: 6px 14px;
  border-radius: 20px;
  display: inline-block;
}
.p1 .player-xp { background: var(--neon-blue-light); color: var(--neon-blue); }
.p2 .player-xp { background: var(--neon-purple-light); color: var(--neon-purple); }

/* ── MAIN APP ── */
#mainApp { display: none; }

.app-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 0 28px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.back-btn {
  background: var(--surface);
  border: 2px solid var(--border-strong);
  border-radius: 14px;
  color: var(--text-dim);
  font-size: 20px;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  box-shadow: var(--shadow);
  flex-shrink: 0;
}
.back-btn:hover { border-color: var(--neon-blue); color: var(--neon-blue); }
.header-info { flex: 1; min-width: 150px; }
.header-player { font-family: 'Fredoka One', cursive; font-size: 24px; }
.header-player.p1c { color: var(--neon-blue); }
.header-player.p2c { color: var(--neon-purple); }
.header-sub { font-size: 15px; color: var(--text-dim); margin-top: 3px; font-weight: 700; }
.header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.header-xp {
  background: var(--gold-light);
  border: 2px solid rgba(217,119,6,0.25);
  border-radius: 16px;
  padding: 10px 18px;
  text-align: center;
  box-shadow: var(--shadow);
}
.xp-num { font-family: 'Fredoka One', cursive; font-size: 30px; color: var(--gold); line-height: 1; }
.xp-label { font-size: 13px; color: var(--gold2); letter-spacing: 1px; font-weight: 800; margin-top: 2px; }

/* ── TIMER ── */
.timer-widget {
  background: var(--surface);
  border: 2px solid var(--border-strong);
  border-radius: 16px;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: var(--shadow);
  flex-shrink: 0;
}
.timer-display {
  font-family: 'Fredoka One', cursive;
  font-size: 26px;
  color: var(--neon-blue);
  min-width: 78px;
  text-align: center;
  letter-spacing: 1px;
}
.timer-display.running { color: var(--neon-green); }
.timer-display.warning { color: var(--gold); }
.timer-btns { display: flex; gap: 6px; }
.timer-btn {
  background: var(--surface2);
  border: 2px solid var(--border-strong);
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 14px;
  font-weight: 800;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
  color: var(--text-mid);
}
.timer-btn:hover { background: var(--neon-blue); color: #fff; border-color: var(--neon-blue); }
.timer-btn.active { background: var(--neon-green); color: #fff; border-color: var(--neon-green); }
.timer-preset { font-size: 13px; color: var(--text-dim); font-weight: 700; }
.timer-presets { display: flex; gap: 4px; }
.timer-preset-btn {
  background: transparent;
  border: 1.5px solid var(--border-strong);
  border-radius: 6px;
  padding: 3px 9px;
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
  font-family: inherit;
  color: var(--text-dim);
  transition: all 0.15s;
}
.timer-preset-btn:hover { background: var(--neon-blue-light); color: var(--neon-blue); border-color: var(--neon-blue); }

/* XP bar */
.xp-bar-wrap {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 18px 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
}
.xp-bar-header { display: flex; justify-content: space-between; font-size: 15px; color: var(--text-mid); margin-bottom: 12px; font-weight: 800; letter-spacing: 1px; }
.xp-bar-track { height: 14px; background: var(--surface3); border-radius: 12px; overflow: hidden; }
.xp-bar-fill {
  height: 100%;
  border-radius: 12px;
  background: linear-gradient(90deg, var(--gold2), var(--gold));
  transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 0 12px rgba(245,158,11,0.4);
}

/* Stats */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
.stat-box { background: var(--surface); border: 2px solid var(--border); border-radius: 18px; padding: 18px 16px; text-align: center; box-shadow: var(--shadow); }
.stat-num { font-family: 'Fredoka One', cursive; font-size: 34px; color: var(--neon-blue); line-height: 1; }
.stat-label { font-size: 13px; color: var(--text-dim); letter-spacing: 1px; margin-top: 6px; text-transform: uppercase; font-weight: 800; }

/* Week nav */
.week-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 24px; scrollbar-width: none; }
.week-scroll::-webkit-scrollbar { display: none; }
.week-pill {
  flex-shrink: 0;
  background: var(--surface);
  border: 2px solid var(--border-strong);
  border-radius: 40px;
  padding: 11px 26px;
  font-size: 15px;
  font-weight: 800;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  font-family: inherit;
  box-shadow: var(--shadow);
}
.week-pill:hover { border-color: var(--neon-blue); color: var(--neon-blue); }
.week-pill.active { background: var(--neon-blue); border-color: var(--neon-blue); color: #fff; box-shadow: 0 4px 16px rgba(37,99,235,0.3); }

/* Week header */
.week-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding: 18px 24px; background: var(--surface); border: 2px solid var(--border); border-radius: 18px; box-shadow: var(--shadow); }
.week-icon { font-size: 32px; }
.week-title { font-family: 'Fredoka One', cursive; font-size: 21px; color: var(--neon-blue); }
.week-progress { font-size: 15px; color: var(--text-dim); font-weight: 700; margin-top: 2px; }

/* Day tiles */
.days-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px; }
.day-tile {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
  box-shadow: var(--shadow);
}
.day-tile:hover { box-shadow: var(--shadow-md); }
.day-tile.completed { border-color: rgba(5,150,105,0.35); background: linear-gradient(135deg, #fff, #f0fdf8); }
.day-tile-header { display: flex; align-items: center; gap: 16px; padding: 22px 28px; cursor: pointer; }
.day-icon { width: 58px; height: 58px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
.icon-math { background: var(--neon-blue-light); }
.icon-grammar { background: var(--neon-purple-light); }
.icon-ai { background: var(--neon-green-light); }
.icon-free { background: var(--neon-red-light); }
.day-meta { flex: 1; }
.day-name { font-weight: 900; font-size: 20px; color: var(--text); }
.day-type { font-size: 14px; color: var(--text-dim); margin-top: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.day-status { display: flex; align-items: center; gap: 10px; }
.check-circle { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--border-strong); display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.3s; background: transparent; cursor: pointer; font-family: inherit; flex-shrink: 0; }
.check-circle.done { background: var(--neon-green); border-color: var(--neon-green); color: #fff; }
.day-xp-badge { background: var(--gold-light); border: 1px solid rgba(217,119,6,0.25); border-radius: 10px; padding: 6px 12px; font-size: 14px; font-weight: 800; color: var(--gold); white-space: nowrap; }

.day-body { display: none; border-top: 2px solid var(--border); padding: 28px 28px 28px; }
.day-tile.open .day-body { display: block; }

/* Segments */
.seg-block { margin-bottom: 24px; }
.seg-block:last-of-type { margin-bottom: 0; }
.seg-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.seg-badge { font-size: 13px; font-weight: 800; letter-spacing: 1px; padding: 6px 14px; border-radius: 8px; text-transform: uppercase; }
.badge-warmup { background: rgba(245,158,11,0.15); color: var(--gold); border: 1px solid rgba(245,158,11,0.3); }
.badge-mission { background: var(--neon-blue-light); color: var(--neon-blue); border: 1px solid rgba(37,99,235,0.2); }
.badge-boss { background: var(--neon-red-light); color: var(--neon-red); border: 1px solid rgba(220,38,38,0.2); }
.badge-grammar-work { background: var(--neon-purple-light); color: var(--neon-purple); border: 1px solid rgba(124,58,237,0.2); }
.seg-timer { font-size: 14px; color: var(--text-dim); font-weight: 700; }
.seg-content { font-size: 17px; line-height: 1.8; color: var(--text-mid); }
.seg-content strong { color: var(--text); font-weight: 900; }

/* Single-player mission block */
.mission-block { padding: 16px 20px; border-radius: 14px; margin-top: 8px; }
.mission-p1 { background: var(--neon-blue-light); border: 1px solid rgba(37,99,235,0.2); }
.mission-p2 { background: var(--neon-purple-light); border: 1px solid rgba(124,58,237,0.2); }
.mission-label { font-size: 13px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.mission-p1 .mission-label { color: var(--neon-blue); }
.mission-p2 .mission-label { color: var(--neon-purple); }
.mission-content { font-size: 17px; line-height: 1.75; color: var(--text-mid); }

/* KA links — prominent */
.ka-section { margin-top: 14px; padding: 14px 16px; background: #E8F8F1; border: 2px solid #10B981; border-radius: 12px; }
.ka-section-label { font-size: 14px; font-weight: 900; color: #059669; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.ka-links-row { display: flex; gap: 8px; flex-wrap: wrap; }
.ka-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, #059669, #10B981);
  border: none;
  border-radius: 10px;
  padding: 11px 18px;
  font-size: 16px;
  color: #fff;
  font-weight: 800;
  text-decoration: none;
  transition: all 0.2s;
  letter-spacing: 0.3px;
  box-shadow: 0 3px 10px rgba(5,150,105,0.3);
}
.ka-link:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(5,150,105,0.4); opacity: 0.92; }
.ka-link::before { content: '📚 '; }

/* Typing links */
.typing-section { margin-top: 14px; padding: 14px 16px; background: #FFF7ED; border: 2px solid #F59E0B; border-radius: 12px; }
.typing-section-label { font-size: 14px; font-weight: 900; color: #D97706; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.typing-links-row { display: flex; gap: 8px; flex-wrap: wrap; }
.typing-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, #D97706, #F59E0B);
  border: none;
  border-radius: 10px;
  padding: 11px 18px;
  font-size: 16px;
  color: #fff;
  font-weight: 800;
  text-decoration: none;
  transition: all 0.2s;
  box-shadow: 0 3px 10px rgba(217,119,6,0.3);
}
.typing-link:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(217,119,6,0.4); opacity: 0.92; }
.typing-link::before { content: '⌨️ '; }

/* Tools row */
.tools-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; margin-bottom: 4px; }
.tool-chip { background: var(--surface2); border: 1px solid var(--border-strong); border-radius: 8px; padding: 6px 14px; font-size: 14px; color: var(--text-dim); font-weight: 700; }

/* ── DAILY TASK CHECKLIST ── */
.task-checklist {
  background: #F0F7FF;
  border: 2px solid rgba(37,99,235,0.2);
  border-radius: 14px;
  padding: 16px 20px;
  margin-bottom: 20px;
}
.task-checklist-title {
  font-family: 'Fredoka One', cursive;
  font-size: 16px;
  color: var(--neon-blue);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.task-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(37,99,235,0.1);
  cursor: pointer;
  transition: background 0.15s;
  border-radius: 8px;
  padding-left: 6px;
  padding-right: 6px;
}
.task-item:last-child { border-bottom: none; }
.task-item:hover { background: rgba(37,99,235,0.05); }
.task-checkbox {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  border: 2.5px solid var(--border-strong);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  transition: all 0.2s;
  background: white;
}
.task-item.checked .task-checkbox {
  background: var(--neon-green);
  border-color: var(--neon-green);
  color: white;
}
.task-item.checked .task-text {
  text-decoration: line-through;
  opacity: 0.6;
}
.task-text {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-mid);
  transition: all 0.2s;
}

/* Complete button — toggleable */
.complete-btn {
  width: 100%;
  margin-top: 24px;
  padding: 18px;
  border-radius: 14px;
  border: none;
  font-family: 'Fredoka One', cursive;
  font-size: 20px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.complete-btn.incomplete { background: linear-gradient(135deg, var(--neon-blue), #3B82F6); color: #fff; box-shadow: 0 4px 20px rgba(37,99,235,0.35); }
.complete-btn.incomplete:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(37,99,235,0.4); }
.complete-btn.completed-state { background: var(--neon-green-light); border: 2px solid var(--neon-green); color: var(--neon-green); cursor: pointer; font-weight: 800; }
.complete-btn.completed-state:hover { background: #FEE2E2; border-color: var(--neon-red); color: var(--neon-red); }
.undo-hint { font-size: 13px; text-align: center; color: var(--text-dim); margin-top: 6px; font-weight: 600; }

/* Free day */
.free-day-body { padding: 20px 0 4px; color: var(--text-mid); font-size: 17px; line-height: 1.75; }
.free-day-title { font-family: 'Fredoka One', cursive; font-size: 20px; color: var(--neon-red); margin-bottom: 10px; }

/* ── GRAMMAR WORK AREA ── */
.grammar-work-area {
  background: #FAFAF7;
  border: 2px solid rgba(124,58,237,0.25);
  border-radius: 14px;
  padding: 20px 24px;
  margin-top: 16px;
}
.grammar-work-title { font-family: 'Fredoka One', cursive; font-size: 18px; color: var(--neon-purple); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.notebook-prompt { background: #EDE9FE; border: 1.5px solid rgba(124,58,237,0.3); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; font-size: 16px; font-weight: 700; color: var(--neon-purple); display: flex; align-items: flex-start; gap: 8px; line-height: 1.5; }
.notebook-prompt::before { content: '✏️'; font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.grammar-questions { display: flex; flex-direction: column; gap: 14px; }
.grammar-q { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 18px; }
.grammar-q-label { font-size: 13px; font-weight: 900; color: var(--neon-purple); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.grammar-q-text { font-size: 17px; color: var(--text); font-weight: 700; margin-bottom: 10px; line-height: 1.6; }
.grammar-q-text em { font-style: italic; color: var(--neon-blue); }
.grammar-answer-area { width: 100%; border: 2px solid var(--border-strong); border-radius: 8px; padding: 10px 14px; font-family: inherit; font-size: 16px; color: var(--text); background: #FAFAFA; resize: vertical; min-height: 70px; transition: border-color 0.2s; }

// ─── TIMER ───────────────────────────────────────────────────────────────
let timerInterval, timerRunning = false, timerSeconds = 0;
let timerTarget = 0;

function setTimer(minutes) {
  timerReset();
  timerTarget = minutes * 60;
  timerSeconds = timerTarget;
  updateTimerDisplay();
}

function timerToggle() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('timerStartBtn').textContent = '▶';
    document.getElementById('timerStartBtn').classList.remove('active');
  } else {
    if (timerSeconds <= 0 && timerTarget > 0) timerSeconds = timerTarget;
    if (timerSeconds <= 0) timerSeconds = 0;
    timerRunning = true;
    document.getElementById('timerStartBtn').textContent = '⏸';
    document.getElementById('timerStartBtn').classList.add('active');
    timerInterval = setInterval(() => {
      if (timerTarget > 0) {
        timerSeconds--;
        if (timerSeconds <= 0) {
          timerSeconds = 0;
          timerRunning = false;
          clearInterval(timerInterval);
          document.getElementById('timerStartBtn').textContent = '▶';
          document.getElementById('timerStartBtn').classList.remove('active');
          document.getElementById('timerDisplay').style.color = '#DC2626';
          setTimeout(() => { document.getElementById('timerDisplay').style.color = ''; updateTimerDisplay(); }, 3000);
        }
      } else {
        timerSeconds++;
      }
      updateTimerDisplay();
    }, 1000);
  }
}

function timerReset() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSeconds = timerTarget;
  document.getElementById('timerStartBtn').textContent = '▶';
  document.getElementById('timerStartBtn').classList.remove('active');
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const m = Math.floor(Math.abs(timerSeconds) / 60);
  const s = Math.abs(timerSeconds) % 60;
  const display = document.getElementById('timerDisplay');
  display.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  display.className = 'timer-display';
  if (timerRunning && timerTarget > 0) {
    if (timerSeconds <= 60) display.className = 'timer-display warning';
    else display.className = 'timer-display running';
  } else if (timerRunning) {
    display.className = 'timer-display running';
  }
}

// ─── DAILY TASK DEFINITIONS ─────────────────────────────────────────────────
function getDayTasks(day, player) {
  if (day.free) {
    return [{ id: 'free', label: '🎉 Enjoy your free day!' }];
  }
  const tasks = [
    { id: 'warmup', label: '🔥 Warm-Up (5 min)' },
    { id: 'mission', label: '⚔️ Main Mission (15 min)' },
  ];
  if ((player === 1 && day.ka_p1 && day.ka_p1.length) || (player === 2 && day.ka_p2 && day.ka_p2.length)) {
    tasks.push({ id: 'ka', label: '📚 Khan Academy Practice' });
  }
  tasks.push({ id: 'boss', label: '💀 Boss Battle (10 min)' });
  if (day.grammar) {
    tasks.push({ id: 'grammar', label: '✍️ Grammar Work Area' });
  }
  if (day.type === 'ai') {
    tasks.push({ id: 'typing', label: '⌨️ Typing Practice' });
  }
  return tasks;
}

// ─── STATE ───────────────────────────────────────────────────────────────
const STORAGE_KEY = 'levelUpAcademy_v5';
let state = { p1: { xp: 0, completed: {}, grammar: {}, tasks: {} }, p2: { xp: 0, completed: {}, grammar: {}, tasks: {} } };
let currentPlayer = null;
let currentWeek = 0;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state = parsed;
      if (!state.p1.grammar) state.p1.grammar = {};
      if (!state.p2.grammar) state.p2.grammar = {};
      if (!state.p1.tasks) state.p1.tasks = {};
      if (!state.p2.tasks) state.p2.tasks = {};
    }
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function getPlayerState() { return currentPlayer === 1 ? state.p1 : state.p2; }
function getDayKey(wi, di) { return `w${wi}_d${di}`; }
function isCompleted(wi, di) { return !!getPlayerState().completed[getDayKey(wi, di)]; }
function getTotalXP() { return getPlayerState().xp; }

function getLevel() {
  const xp = getTotalXP();
  let level = 0;
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (xp >= LEVELS[i].xp) { level = i; break; }
  }
  return level;
}

function getLevelProgress() {
  const xp = getTotalXP();
  const lvl = getLevel();
  const curr = LEVELS[lvl].xp;
  const next = LEVELS[lvl + 1] ? LEVELS[lvl + 1].xp : curr + 500;
  return { pct: Math.min(100, ((xp - curr) / (next - curr)) * 100), curr: xp - curr, total: next - curr, nextName: LEVELS[lvl + 1]?.name || 'MAX' };
}

function getSessionCount() { return Object.keys(getPlayerState().completed).length; }
function getWeeksCompleted() {
  let count = 0;
  WEEKS.forEach((w, wi) => { if (w.days.every((_, di) => isCompleted(wi, di))) count++; });
  return count;
}
function getStreak() { return Math.min(getSessionCount(), 7); }

// Task checklist helpers
function getTaskKey(wi, di, taskId) { return `t_w${wi}_d${di}_${taskId}`; }
function isTaskChecked(wi, di, taskId) { return !!getPlayerState().tasks[getTaskKey(wi, di, taskId)]; }
function toggleTask(wi, di, taskId) {
  const k = getTaskKey(wi, di, taskId);
  const ps = getPlayerState();
  ps.tasks[k] = !ps.tasks[k];
  saveState();
  renderDays();
}

// ─── RENDER ───────────────────────────────────────────────────────────────
function updateHeader() {
  const xp = getTotalXP(), lvl = getLevel(), prog = getLevelProgress();
  document.getElementById('headerXP').textContent = xp;
  document.getElementById('headerPlayerName').textContent = `${LEVELS[lvl].name} — Player ${currentPlayer}`;
  document.getElementById('headerPlayerName').className = `header-player p${currentPlayer}c`;
  document.getElementById('headerPlayerSub').textContent = currentPlayer === 1 ? 'Age 9 · Rising 4th Grade' : 'Age 11 · Rising 6th Grade';
  document.getElementById('levelLabel').textContent = `LEVEL ${lvl + 1}: ${LEVELS[lvl].name.toUpperCase()}`;
  document.getElementById('xpToNext').textContent = `${prog.curr} / ${prog.total} XP → ${prog.nextName}`;
  document.getElementById('xpBarFill').style.width = prog.pct + '%';
  document.getElementById('statSessions').textContent = getSessionCount();
  document.getElementById('statStreak').textContent = getStreak();
  document.getElementById('statWeeks').textContent = getWeeksCompleted();
}

function renderWeekNav() {
  const nav = document.getElementById('weekScroll');
  nav.innerHTML = WEEKS.map((w, i) => {
    const allDone = w.days.every((_, di) => isCompleted(i, di));
    const reviewTag = w.review ? ' 🔄' : '';
    return `<button class="week-pill ${i === currentWeek ? 'active' : ''}" onclick="selectWeek(${i})">${w.icon}${reviewTag} ${allDone ? '✅' : ''} Wk ${w.num}</button>`;
  }).join('');
}

function renderWeekHeader() {
  const w = WEEKS[currentWeek];
  const doneDays = w.days.filter((_, di) => isCompleted(currentWeek, di)).length;
  const reviewHtml = w.review ? `<span class="review-badge">Review: ${w.reviewGrade[currentPlayer] || ''}</span>` : '';
  document.getElementById('weekHeader').innerHTML = `
    <div class="week-header">
      <div class="week-icon">${w.icon}</div>
      <div>
        <div class="week-title">${w.label} ${reviewHtml}</div>
        <div class="week-progress">${doneDays} of ${w.days.length} days complete</div>
      </div>
    </div>`;
}

function buildKASection(kaLinks) {
  if (!kaLinks || !kaLinks.length) return '';
  const linksHtml = kaLinks.map(l => `<a class="ka-link" href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`).join('');
  return `<div class="ka-section">
    <div class="ka-section-label">📚 Khan Academy — Click to Practice!</div>
    <div class="ka-links-row">${linksHtml}</div>
  </div>`;
}

function buildTypingSection(player) {
  const links = TYPING_LINKS[player] || [];
  if (!links.length) return '';
  const linksHtml = links.map(l => `<a class="typing-link" href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`).join('');
  return `<div class="typing-section">
    <div class="typing-section-label">⌨️ Typing Practice — Do one before you start!</div>
    <div class="typing-links-row">${linksHtml}</div>
  </div>`;
}

function buildGrammarSection(weekIdx, dayIdx, player) {
  const key = `w${weekIdx}_d${dayIdx}_p${player}`;
  const ex = GRAMMAR_EXERCISES[key];
  if (!ex) return '';
  const qs = ex.questions.map((q, qi) => {
    const savedAnswer = (getPlayerState().grammar[`${key}_q${qi}`]) || '';
    const savedGrade = getPlayerState().grammar[`${key}_g${qi}`] || '';
    return `<div class="grammar-q">
      <div class="grammar-q-label">Question ${qi+1}: ${q.label}</div>
      <div class="grammar-q-text">${q.text}</div>
      <textarea class="grammar-answer-area" placeholder="Type your answer here..." onchange="saveGrammarAnswer('${key}', ${qi}, this.value)">${savedAnswer}</textarea>
      <button class="grammar-reveal-btn" onclick="revealAnswer('${key}_ans_${qi}')">👁 Show Model Answer</button>
      <div class="grammar-answer-reveal" id="${key}_ans_${qi}">✅ Model Answer: ${q.answer}</div>
      <div class="grade-btns" style="margin-top:10px">
        <button class="grade-btn excellent ${savedGrade==='excellent'?'selected':''}" onclick="saveGrade('${key}', ${qi}, 'excellent', this)">🌟 Excellent</button>
        <button class="grade-btn good ${savedGrade==='good'?'selected':''}" onclick="saveGrade('${key}', ${qi}, 'good', this)">👍 Good</button>
        <button class="grade-btn practice ${savedGrade==='practice'?'selected':''}" onclick="saveGrade('${key}', ${qi}, 'practice', this)">✏️ Needs Practice</button>
      </div>
    </div>`;
  }).join('');
  return `<div class="grammar-work-area">
    <div class="grammar-work-title">📝 Grammar Work — Complete Below</div>
    <div class="notebook-prompt">Write your answers in your notebook with pencil FIRST! Then type your final answers here for grading. ${ex.notebook}</div>
    <div class="grammar-questions">${qs}</div>
  </div>`;
}

function buildChecklistSection(weekIdx, dayIdx, day) {
  const tasks = getDayTasks(day, currentPlayer);
  const taskItems = tasks.map(t => {
    const checked = isTaskChecked(weekIdx, dayIdx, t.id);
    return `<div class="task-item ${checked ? 'checked' : ''}" onclick="toggleTask(${weekIdx}, ${dayIdx}, '${t.id}')">
      <div class="task-checkbox">${checked ? '✓' : ''}</div>
      <div class="task-text">${t.label}</div>
    </div>`;
  }).join('');
  const total = tasks.length;
  const done = tasks.filter(t => isTaskChecked(weekIdx, dayIdx, t.id)).length;
  return `<div class="task-checklist">
    <div class="task-checklist-title">☑️ Today's Tasks — ${done}/${total} done</div>
    ${taskItems}
  </div>`;
}

function renderDays() {
  const list = document.getElementById('daysList');
  const week = WEEKS[currentWeek];

    const done = isCompleted(currentWeek, di);
    const iconClass = `icon-${day.type}`;

    const p = currentPlayer;

      return `<div class="day-tile ${done ? 'completed' : ''}" id="${key}">
        <div class="day-tile-header" onclick="toggleDay('${key}')">
          <div class="day-icon ${iconClass}">${day.emoji}</div>
          <div class="day-meta">
            <div class="day-name">${day.name}</div>
            <div class="day-type">Free Day 🎉</div>
          </div>
          <div class="day-status">
            <div class="day-xp-badge">+${day.xp} XP</div>
            <button class="check-circle ${done ? 'done' : ''}" onclick="event.stopPropagation(); toggleComplete(${currentWeek}, ${di}, ${day.xp})">${done ? '✓' : ''}</button>

        <div class="day-body">

  document.getElementById('mainApp').style.display = 'block';
  renderAll();
  updateSelectScreen();
}

function goBack() {
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('playerSelectScreen').style.display = 'flex';
  updateSelectScreen();
  currentPlayer = null;
  timerReset();
  timerTarget = 0;
  timerSeconds = 0;
  updateTimerDisplay();
}

function updateSelectScreen() {
  document.getElementById('p1xpDisplay').textContent = `⚡ ${state.p1.xp} XP`;
  document.getElementById('p2xpDisplay').textContent = `⚡ ${state.p2.xp} XP`;
}

function selectWeek(idx) { currentWeek = idx; renderAll(); }
function toggleDay(id) { document.getElementById(id).classList.toggle('open'); }

function toggleComplete(weekIdx, dayIdx, xpValue) {
  const key = getDayKey(weekIdx, dayIdx);
  const ps = getPlayerState();
  if (ps.completed[key]) {
    delete ps.completed[key];
    ps.xp = Math.max(0, ps.xp - xpValue);
    saveState();
    renderAll();
  } else {
    ps.completed[key] = true;
    ps.xp += xpValue;
    saveState();
    const day = WEEKS[weekIdx].days[dayIdx];
    showXPPopup(xpValue, day, weekIdx, dayIdx);
    renderAll();
  }
}

function showXPPopup(xp, day, weekIdx, dayIdx) {
  const allWeekDone = WEEKS[weekIdx].days.every((_, di) => isCompleted(weekIdx, di));
  const icon = day.free ? '🎉' : day.type === 'math' ? '📐' : day.type === 'grammar' ? '✍️' : '🤖';
  const msgs = ["You're on fire! 🔥", "Crushing it!", "XP earned! 💪", "Level up incoming!", "Quest complete!", "Keep going! ⚡"];
  const sub = allWeekDone ? `🏆 Week ${weekIdx + 1} Complete! Full Week Bonus!` : msgs[Math.floor(Math.random() * msgs.length)];
  document.getElementById('popupIcon').textContent = icon;
  document.getElementById('popupTitle').textContent = day.free ? 'FREE DAY DONE!' : 'SESSION COMPLETE!';
  document.getElementById('popupXP').textContent = `+${xp} XP`;
  document.getElementById('popupSub').textContent = sub;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('xpPopup').classList.add('show');
  for (let i = 0; i < 8; i++) setTimeout(() => spawnStar(), i * 80);
}

function spawnStar() {
  const star = document.createElement('div');
  star.className = 'star-burst';
  const icons = ['⭐','✨','💫','🌟','⚡'];
  star.textContent = icons[Math.floor(Math.random() * icons.length)];
  const tx = (Math.random() - 0.5) * 300, ty = (Math.random() - 0.5) * 300;
  star.style.cssText = `left:50%;top:50%;--tx:${tx}px;--ty:${ty}px;`;
  document.body.appendChild(star);
  setTimeout(() => star.remove(), 1000);
}

function closePopup() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('xpPopup').classList.remove('show');
}

function saveGrammarAnswer(key, qi, value) {
  const ps = getPlayerState();
  if (!ps.grammar) ps.grammar = {};
  ps.grammar[`${key}_q${qi}`] = value;
  saveState();
}

function revealAnswer(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('shown');
}

function saveGrade(key, qi, grade, btn) {
  const ps = getPlayerState();
  if (!ps.grammar) ps.grammar = {};
  ps.grammar[`${key}_g${qi}`] = grade;
  saveState();
  const parent = btn.closest('.grade-btns');
  parent.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// ─── INIT ────────────────────────────────────────────────────────────────
loadState();
updateSelectScreen();
updateTimerDisplay();
</script>
</body>
</html>
